# OpenWrt X86_64 云编译 - 全中文界面 + 所有插件
# 管理IP: 10.0.0.254  子网掩码: 255.0.0.0

name: 编译X86全功能固件

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: X86全功能固件编译
    runs-on: ubuntu-22.04

    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 释放磁盘空间
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker image prune -af
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android
          sudo apt-get update
          sudo apt-get purge -y azure-cli* docker* ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mysql* php* mongodb* snap*
          sudo apt-get full-upgrade -y
          sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo apt-get autoremove --purge
          sudo apt-get clean
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: 释放更多磁盘空间
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: 更新feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 导入配置
        run: |
          cat >> .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_IMAGES="ext4.gz"
          CONFIG_TARGET_KERNEL_PARTSIZE=32
          CONFIG_TARGET_ROOTFS_PARTSIZE=512
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-nginx=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_libiwinfo-lua=y
          CONFIG_PACKAGE_liblua=y
          CONFIG_PACKAGE_libuci-lua=y
          CONFIG_PACKAGE_lua=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-luci-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-nginx-zh-cn=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-app-argon-config=y
          CONFIG_PACKAGE_luci-i18n-argon-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-argon-config-zh-cn=y
          CONFIG_PACKAGE_luci-app-adguardhome=y
          CONFIG_PACKAGE_luci-i18n-adguardhome-zh-cn=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-i18n-openclash-zh-cn=y
          CONFIG_PACKAGE_luci-app-mosdns=y
          CONFIG_PACKAGE_luci-i18n-mosdns-zh-cn=y
          CONFIG_PACKAGE_luci-app-softethervpn=y
          CONFIG_PACKAGE_luci-i18n-softethervpn-zh-cn=y
          CONFIG_PACKAGE_luci-app-snmpd=y
          CONFIG_PACKAGE_luci-i18n-snmpd-zh-cn=y
          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_nftables=y
          CONFIG_PACKAGE_dnsmasq-full=y
          # 排除libustream-openssl避免与mbedtls冲突
          CONFIG_PACKAGE_libustream-openssl=n
          CONFIG_PACKAGE_libustream-openssl20201210=n
          EOF
          make defconfig

      - name: 配置管理IP
        run: |
          mkdir -p files/etc/config
          cat > files/etc/config/network << 'NETEOF'
          config interface 'loopback'
                  option proto 'static'
                  option ipaddr '127.0.0.1'
                  option netmask '255.0.0.0'
                  option device 'lo'

          config globals 'globals'
                  option ula_prefix 'fd57:4f93:e88d::/48'

          config interface 'lan'
                  option type 'bridge'
                  option proto 'static'
                  option ipaddr '10.0.0.254'
                  option netmask '255.0.0.0'
                  option device 'br-lan'
                  list ip6addr 'slaac'

          config interface 'wan'
                  option proto 'dhcp'
          NETEOF

      - name: 下载软件包
        run: |
          make download -j$(nproc) || make download -j1 V=s

      - name: 编译固件
        id: compile
        run: |
          make -j$(nproc) || make -j1 V=s
          echo "date=$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT

      - name: 整理文件
        id: organize
        run: |
          # 查找实际固件输出路径（兼容不同配置）
          TARGET_DIR=$(find bin/targets/x86/64 -type d -name "generic" -o -type d -name "release" | head -1)
          if [ -z "$TARGET_DIR" ]; then
            TARGET_DIR="bin/targets/x86/64"
          fi
          echo "Using target dir: $TARGET_DIR"
          ls -lhR "$TARGET_DIR"
          FOUND=""
          for f in "$TARGET_DIR"/*.img.gz; do
            if [ -f "$f" ]; then
              zip -r "openwrt-x86-64-full-custom.zip" "$f"
              FOUND="openwrt-x86-64-full-custom.zip"
              echo "firmware=$FOUND" >> $GITHUB_OUTPUT
              break
            fi
          done
          if [ -z "$FOUND" ]; then
            echo "ERROR: No .img.gz file found in $TARGET_DIR"
            exit 1
          fi

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-X86-64-全功能固件
          path: openwrt-x86-64-full-custom.zip
          retention-days: 7

      - name: 上传配置文件
        uses: actions/upload-artifact@v4
        with:
          name: 编译配置文件
          path: .config
